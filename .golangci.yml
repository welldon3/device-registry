linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - gocritic
    - misspell
    - prealloc

linters-settings:
  gocritic:
    disabled-checks:
      - ifElseChain

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
